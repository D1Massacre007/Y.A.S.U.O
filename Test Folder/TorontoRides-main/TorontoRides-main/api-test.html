<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Testing - Toronto Riders</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 12px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        h1 {
            color: #333;
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 2rem;
        }
        
        .status {
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 2rem;
        }
        
        .status.success {
            background: #d4edda;
            border: 1px solid #c3e6cb;
            color: #155724;
        }
        
        .status.error {
            background: #f8d7da;
            border: 1px solid #f5c6cb;
            color: #721c24;
        }
        
        .status.pending {
            background: #fff3cd;
            border: 1px solid #ffeaa7;
            color: #856404;
        }
        
        .test-section {
            margin-bottom: 2rem;
            padding: 1.5rem;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
        }
        
        .test-section h2 {
            color: #FF6B35;
            margin-bottom: 1rem;
            font-size: 1.3rem;
        }
        
        button {
            background: #FF6B35;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-size: 1rem;
            cursor: pointer;
            margin-right: 0.5rem;
            margin-bottom: 0.5rem;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #e55a2b;
        }
        
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        
        .response {
            background: #f5f5f5;
            padding: 1rem;
            border-radius: 6px;
            margin-top: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            max-height: 300px;
            overflow-y: auto;
            display: none;
        }
        
        .response.show {
            display: block;
        }
        
        .response pre {
            margin: 0;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        
        .input-group {
            margin-bottom: 1rem;
        }
        
        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #555;
            font-weight: 500;
        }
        
        .input-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚗 Toronto Riders API Testing</h1>
        <p class="subtitle">Test your backend API endpoints</p>
        
        <div id="apiStatus" class="status pending">
            <strong>Status:</strong> Checking API connection...
        </div>
        
        <!-- Health Check -->
        <div class="test-section">
            <h2>1. Health Check</h2>
            <p>Verify the backend API is running</p>
            <button onclick="testHealth()">Test Health Endpoint</button>
            <div id="healthResponse" class="response"></div>
        </div>
        
        <!-- Authentication -->
        <div class="test-section">
            <h2>2. Authentication</h2>
            
            <h3 style="margin-bottom: 1rem;">Sign Up</h3>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="signupEmail" placeholder="test@example.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="signupPassword" placeholder="password123">
            </div>
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" id="signupName" placeholder="John Doe">
            </div>
            <button onclick="testSignUp()">Sign Up</button>
            <div id="signupResponse" class="response"></div>
            
            <h3 style="margin: 1.5rem 0 1rem;">Sign In</h3>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="signinEmail" placeholder="test@example.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" id="signinPassword" placeholder="password123">
            </div>
            <button onclick="testSignIn()">Sign In</button>
            <div id="signinResponse" class="response"></div>
        </div>
        
        <!-- Vehicles -->
        <div class="test-section">
            <h2>3. Vehicles</h2>
            <button onclick="testGetVehicles()">Get All Vehicles</button>
            <button onclick="testGetVehiclesFiltered()">Get Filtered Vehicles (Sedan)</button>
            <div id="vehiclesResponse" class="response"></div>
        </div>
        
        <!-- Bookings -->
        <div class="test-section">
            <h2>4. Bookings (Requires Authentication)</h2>
            <button onclick="testGetBookings()">Get My Bookings</button>
            <button onclick="testCheckAvailability()">Check Availability</button>
            <div id="bookingsResponse" class="response"></div>
        </div>
    </div>
    
    <script src="api-client.js"></script>
    <script>
        const API_URL = 'http://localhost:5000/api';
        
        // Check API status on load
        window.addEventListener('DOMContentLoaded', checkAPIStatus);
        
        async function checkAPIStatus() {
            try {
                const response = await fetch(`${API_URL}/health`);
                const data = await response.json();
                
                if (data.status === 'success') {
                    document.getElementById('apiStatus').className = 'status success';
                    document.getElementById('apiStatus').innerHTML = `
                        <strong>✅ API Connected</strong><br>
                        Backend is running at ${API_URL}
                    `;
                }
            } catch (error) {
                document.getElementById('apiStatus').className = 'status error';
                document.getElementById('apiStatus').innerHTML = `
                    <strong>❌ API Not Available</strong><br>
                    Make sure the backend is running: cd backend && npm run dev
                `;
            }
        }
        
        function displayResponse(elementId, data, error = null) {
            const element = document.getElementById(elementId);
            element.className = 'response show';
            
            if (error) {
                element.innerHTML = `<pre style="color: red;">${JSON.stringify(error, null, 2)}</pre>`;
            } else {
                element.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            }
        }
        
        async function testHealth() {
            try {
                const response = await fetch(`${API_URL}/health`);
                const data = await response.json();
                displayResponse('healthResponse', data);
            } catch (error) {
                displayResponse('healthResponse', null, { error: error.message });
            }
        }
        
        async function testSignUp() {
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;
            const fullname = document.getElementById('signupName').value;
            
            if (!email || !password || !fullname) {
                alert('Please fill in all fields');
                return;
            }
            
            try {
                const data = await TorontoRidersAPI.auth.signup({
                    fullname,
                    email,
                    phone: '(416) 555-0123',
                    password,
                    accountType: 'customer'
                });
                displayResponse('signupResponse', data);
            } catch (error) {
                displayResponse('signupResponse', null, { error: error.message });
            }
        }
        
        async function testSignIn() {
            const email = document.getElementById('signinEmail').value;
            const password = document.getElementById('signinPassword').value;
            
            if (!email || !password) {
                alert('Please fill in all fields');
                return;
            }
            
            try {
                const data = await TorontoRidersAPI.auth.signin({ email, password });
                displayResponse('signinResponse', data);
            } catch (error) {
                displayResponse('signinResponse', null, { error: error.message });
            }
        }
        
        async function testGetVehicles() {
            try {
                const data = await TorontoRidersAPI.vehicle.getAll();
                displayResponse('vehiclesResponse', data);
            } catch (error) {
                displayResponse('vehiclesResponse', null, { error: error.message });
            }
        }
        
        async function testGetVehiclesFiltered() {
            try {
                const data = await TorontoRidersAPI.vehicle.getAll({ category: 'sedan' });
                displayResponse('vehiclesResponse', data);
            } catch (error) {
                displayResponse('vehiclesResponse', null, { error: error.message });
            }
        }
        
        async function testGetBookings() {
            try {
                const data = await TorontoRidersAPI.booking.getAll();
                displayResponse('bookingsResponse', data);
            } catch (error) {
                displayResponse('bookingsResponse', null, { error: error.message });
            }
        }
        
        async function testCheckAvailability() {
            try {
                const data = await TorontoRidersAPI.booking.checkAvailability(
                    'tesla-model-3',
                    '2025-12-10',
                    '2025-12-15'
                );
                displayResponse('bookingsResponse', data);
            } catch (error) {
                displayResponse('bookingsResponse', null, { error: error.message });
            }
        }
    </script>
</body>
</html>
